name: Buscador Automatico de Grupos

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  escanear:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Instalar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Instalar dependencias
      run: |
        npm install

    - name: Ejecutar Script Cazador
      run: node bot.js

    - name: Guardar progreso del ID en GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add ultimo_id.txt
        git commit -m "Actualizar ultimo_id [skip ci]" || echo "No hay cambios"
        git push
        
